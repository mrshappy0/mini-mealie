name: Lint & Typecheck

on:
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    lint:
        name: Run ESLint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Install Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: 22
                  cache: 'pnpm'
                  cache-dependency-path: |
                      package.json
                      pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install

            - name: Run Typecheck (app)
              run: pnpm typecheck

            - name: Run Typecheck (e2e harnesses)
              run: pnpm typecheck:e2e

            - name: Run Linter
              run: pnpm lint
