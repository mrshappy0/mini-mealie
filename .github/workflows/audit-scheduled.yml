name: Scheduled Dependency Audit

on:
    schedule:
        - cron: '0 3 * * *'
    workflow_dispatch:

permissions:
    contents: read
    issues: write

jobs:
    audit:
        name: Full Vulnerability Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Install Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: 22
                  cache: 'pnpm'
                  cache-dependency-path: |
                      package.json
                      pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install

            - name: Audit for vulnerabilities
              run: pnpm audit

            - name: Create issue on failure
              if: failure()
              uses: actions/github-script@v9
              with:
                  script: |
                      await github.rest.issues.create({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          title: '\u26a0\ufe0f Dependency vulnerabilities detected',
                          body: `The nightly dependency audit found vulnerabilities. Run \`pnpm audit\` locally to review.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          labels: ['security'],
                      })
